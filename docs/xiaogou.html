<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <title>小狗钱钱 · Wealth Progress</title>
  <style>
    :root {
      --bg: #f2f2f4;
      --screen: #f5f5f7;
      --card: #ffffff;
      --card-2: #f4f5f7;
      --ink: #1d1d1f;
      --ink-2: #6e6e73;
      --ink-3: #a1a1a6;
      --line: #ececed;
      --green: #30a46c;
      --green-strong: #1f8a56;
      --green-soft: rgba(48,164,108,.12);
      --green-ring-track: #eaeceb;
      --red: #d0503a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 2px 10px rgba(20,20,25,.05), 0 10px 30px rgba(20,20,25,.06);
      --shadow-lg: 0 8px 24px rgba(20,20,25,.10), 0 24px 60px rgba(20,20,25,.12);
      --radius: 24px;
      --radius-sm: 16px;
      --blur: saturate(180%) blur(20px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --screen: #0a0a0b;
        --card: #16171a;
        --card-2: #1e2024;
        --ink: #f5f5f7;
        --ink-2: #9a9aa2;
        --ink-3: #6a6a72;
        --line: #232427;
        --green: #34d17e;
        --green-strong: #4ade8b;
        --green-soft: rgba(52,209,126,.14);
        --green-ring-track: #24262a;
        --red: #ff6b52;
        --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
        --shadow: 0 2px 10px rgba(0,0,0,.5);
        --shadow-lg: 0 16px 50px rgba(0,0,0,.6);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100vh; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      display: flex; align-items: center; justify-content: center;
    }
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    /* ===== Device frame (desktop) ===== */
    .device {
      position: relative; width: 100%; max-width: 400px; height: 100vh; max-height: 860px;
      background: var(--screen); overflow: hidden; display: flex; flex-direction: column;
    }
    @media (min-width: 480px) {
      body { padding: 28px; background: radial-gradient(120% 100% at 50% 0%, #e9eaee 0%, #dfe0e5 60%, #d7d8dd 100%); }
      @media (prefers-color-scheme: dark) { body { background: radial-gradient(120% 100% at 50% 0%, #16171b 0%, #0a0a0c 70%); } }
      .device {
        height: 844px; border-radius: 54px; border: 12px solid #0b0b0d;
        box-shadow: var(--shadow-lg), inset 0 0 0 2px rgba(255,255,255,.04);
      }
    }

    /* status bar */
    .statusbar {
      height: 52px; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      padding: 0 26px; padding-top: env(safe-area-inset-top); font-weight: 600; font-size: 15px;
      position: relative; z-index: 5;
    }
    .statusbar .right { display: flex; align-items: center; gap: 7px; }
    .sig { display: inline-flex; align-items: flex-end; gap: 2px; height: 11px; }
    .sig i { width: 3px; background: var(--ink); border-radius: 1px; }
    .sig i:nth-child(1){height:4px} .sig i:nth-child(2){height:6px} .sig i:nth-child(3){height:8px} .sig i:nth-child(4){height:11px}
    .batt { width: 24px; height: 12px; border: 1.5px solid var(--ink); border-radius: 3px; position: relative; opacity:.9; }
    .batt::after { content:""; position:absolute; right:-3px; top:3px; width:2px; height:6px; background:var(--ink); border-radius:0 1px 1px 0; }
    .batt::before { content:""; position:absolute; left:1.5px; top:1.5px; bottom:1.5px; width:70%; background:var(--ink); border-radius:1px; }

    /* scroll area */
    .stage { flex: 1 1 auto; position: relative; overflow: hidden; }
    .view {
      position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 4px 20px 118px; opacity: 0; visibility: hidden; transform: translateY(6px);
      transition: opacity .28s ease, transform .28s ease; scrollbar-width: none;
    }
    .view::-webkit-scrollbar { display: none; }
    .view.active { opacity: 1; visibility: visible; transform: none; }
    .view.detail {
      background: var(--screen); z-index: 20; transform: translateX(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }
    .view.detail.active { transform: none; }

    /* typography */
    .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .02em; color: var(--ink-2); text-transform: none; }
    h1.greet { font-size: 30px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; margin-top: 2px; }
    .section-title { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin: 26px 2px 12px; }
    .section-row { display: flex; align-items: baseline; justify-content: space-between; margin: 26px 2px 12px; }
    .section-row h2 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .link { color: var(--green); font-weight: 600; font-size: 14px; }

    .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-top: 6px; }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%; flex: 0 0 auto; display: grid; place-items: center;
      background: linear-gradient(160deg, #3ecf8e, #22795a); color: #fff; font-weight: 800; font-size: 16px;
      box-shadow: var(--shadow-sm); cursor: pointer;
    }

    /* cards */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
    .p20 { padding: 20px; } .p22 { padding: 22px; }

    /* hero primary goal */
    .hero { padding: 24px; margin-top: 18px; position: relative; overflow: hidden; }
    .hero .htop { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .goal-emoji {
      width: 46px; height: 46px; border-radius: 14px; display: grid; place-items: center; font-size: 24px;
      background: var(--card-2); flex: 0 0 auto;
    }
    .hero .hname { font-size: 17px; font-weight: 700; }
    .hero .hsub { font-size: 13px; color: var(--ink-2); }
    .ring-wrap { display: flex; align-items: center; gap: 22px; margin-top: 14px; }
    .ring { position: relative; width: 132px; height: 132px; flex: 0 0 auto; }
    .ring svg { transform: rotate(-90deg); }
    .ring .ring-center { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; }
    .ring .pct { font-size: 30px; font-weight: 800; letter-spacing: -.02em; }
    .ring .pct span { font-size: 15px; font-weight: 700; }
    .ring .pct-sub { font-size: 11px; color: var(--ink-2); font-weight: 600; margin-top: -2px; }
    .hero .stats { flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .hstat .k { font-size: 12px; color: var(--ink-2); font-weight: 600; }
    .hstat .v { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
    .hstat .v.small { font-size: 18px; }
    .eta {
      margin-top: 20px; display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--green-soft); border-radius: 14px; color: var(--green-strong); font-weight: 700; font-size: 14px;
    }
    .eta .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px var(--green-soft); }

    /* today's progress */
    .today { padding: 8px 4px; }
    .today-total {
      display: flex; align-items: baseline; justify-content: space-between; padding: 18px 20px;
    }
    .today-total .amt { font-size: 32px; font-weight: 800; letter-spacing: -.02em; color: var(--green); }
    .prow { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-top: 1px solid var(--line); }
    .prow .pico { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; font-size: 19px; background: var(--card-2); flex:0 0 auto; }
    .prow .pname { font-weight: 600; font-size: 15px; }
    .prow .pmeta { font-size: 12.5px; color: var(--ink-2); }
    .prow .pamt { margin-left: auto; font-weight: 800; font-size: 16px; }
    .pamt.pos { color: var(--green); }

    .encourage { text-align: center; color: var(--ink-2); font-size: 14px; font-weight: 600; margin: 26px 0 4px; }

    /* goal cards list */
    .goal-card { padding: 18px; margin-bottom: 14px; cursor: pointer; transition: transform .12s ease; }
    .goal-card:active { transform: scale(.985); }
    .goal-card .gc-top { display: flex; align-items: center; gap: 13px; }
    .goal-card .gc-name { font-weight: 700; font-size: 16.5px; }
    .goal-card .gc-eta { font-size: 12.5px; color: var(--ink-2); margin-top: 1px; }
    .goal-card .gc-pct { margin-left: auto; font-weight: 800; font-size: 18px; }
    .bar { height: 9px; border-radius: 999px; background: var(--green-ring-track); overflow: hidden; margin-top: 16px; }
    .bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--green), var(--green-strong)); }
    .gc-foot { display: flex; justify-content: space-between; margin-top: 11px; font-size: 13px; }
    .gc-foot .saved { font-weight: 700; }
    .gc-foot .target { color: var(--ink-2); font-weight: 600; }
    .done-badge { margin-left: auto; font-size: 12px; font-weight: 800; color: var(--green); background: var(--green-soft); padding: 5px 10px; border-radius: 999px; }

    /* income rows */
    .list { overflow: hidden; }
    .irow { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-top: 1px solid var(--line); }
    .irow:first-child { border-top: none; }
    .irow .iname { font-weight: 650; font-size: 15.5px; font-weight: 600; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; color: var(--ink-2); background: var(--card-2); padding: 3px 9px; border-radius: 999px; margin-top: 3px; }
    .irow .iamt { margin-left: auto; text-align: right; }
    .irow .iamt .m { font-weight: 800; font-size: 16px; }
    .irow .iamt .u { font-size: 11.5px; color: var(--ink-2); font-weight: 600; }

    .summary-strip { display: flex; gap: 12px; margin-top: 16px; }
    .summary-strip .card { flex: 1; padding: 16px; }
    .summary-strip .k { font-size: 12px; color: var(--ink-2); font-weight: 600; }
    .summary-strip .v { font-size: 24px; font-weight: 800; letter-spacing: -.02em; margin-top: 3px; }
    .v.green { color: var(--green); }

    /* portfolio */
    .holding { padding: 18px; margin-bottom: 14px; }
    .holding .h-top { display: flex; align-items: center; gap: 13px; }
    .h-tk { font-weight: 800; font-size: 16px; }
    .h-name { font-size: 12.5px; color: var(--ink-2); }
    .h-val { margin-left: auto; text-align: right; }
    .h-val .mv { font-weight: 800; font-size: 16px; }
    .h-val .gl { font-size: 12.5px; font-weight: 700; }
    .h-meta { display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
    .h-meta .k { font-size: 11px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    .h-meta .val { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .funds { margin-top: 14px; }
    .funds .fund-title { font-size: 11px; color: var(--ink-3); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 9px; }
    .fund-line { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .fund-line .fbar { flex: 1; height: 7px; border-radius: 999px; background: var(--green-ring-track); overflow: hidden; }
    .fund-line .fbar > i { display: block; height: 100%; background: var(--green); border-radius: 999px; }
    .fund-line .flabel { font-size: 13px; font-weight: 600; min-width: 108px; }
    .fund-line .fpct { font-size: 13px; font-weight: 800; color: var(--ink-2); width: 38px; text-align: right; }

    /* insights */
    .insight { padding: 18px 18px 18px 18px; margin-bottom: 14px; display: flex; gap: 14px; align-items: flex-start; }
    .insight .ico { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; font-size: 20px; background: var(--green-soft); flex: 0 0 auto; }
    .insight .itxt { font-size: 15.5px; font-weight: 600; line-height: 1.4; }
    .insight .itag { font-size: 12px; color: var(--green); font-weight: 700; margin-top: 6px; }

    /* profile */
    .profile-hero { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 30px 20px 10px; text-align: center; }
    .profile-hero .avatar { width: 78px; height: 78px; font-size: 30px; }
    .profile-hero .pname { font-size: 22px; font-weight: 800; }
    .profile-hero .pmail { font-size: 13.5px; color: var(--ink-2); }
    .menu { overflow: hidden; }
    .mrow { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-top: 1px solid var(--line); font-weight: 600; font-size: 15.5px; }
    .mrow:first-child { border-top: none; }
    .mrow .chev { margin-left: auto; color: var(--ink-3); font-size: 20px; font-weight: 400; }
    .mrow .mico { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; font-size: 17px; background: var(--card-2); }

    /* detail */
    .detail-nav { display: flex; align-items: center; gap: 6px; padding: 2px 0 6px; }
    .back { display: inline-flex; align-items: center; gap: 3px; color: var(--green); font-weight: 600; font-size: 16px; cursor: pointer; }
    .detail-hero { text-align: center; padding: 10px 0 6px; }
    .detail-hero .ring { margin: 4px auto 0; }
    .detail-hero .dname { font-size: 22px; font-weight: 800; margin-top: 14px; }
    .detail-hero .dsub { color: var(--ink-2); font-size: 14px; font-weight: 600; margin-top: 3px; }

    /* tab bar */
    .tabbar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 30;
      display: flex; padding: 8px 8px calc(10px + env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--screen) 90%, transparent); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--line);
    }
    .tab { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; color: var(--ink-3); }
    .tab .ti { width: 25px; height: 25px; }
    .tab .tl { font-size: 10.5px; font-weight: 600; letter-spacing: .01em; }
    .tab.active { color: var(--green); }
    .tab svg { width: 25px; height: 25px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

    /* FAB add */
    .fab {
      position: absolute; right: 20px; bottom: calc(84px + env(safe-area-inset-bottom)); z-index: 25;
      width: 54px; height: 54px; border-radius: 50%; background: var(--green); color: #fff; border: none;
      font-size: 28px; font-weight: 300; box-shadow: var(--shadow-lg); cursor: pointer; display: grid; place-items: center;
    }
    .fab:active { transform: scale(.94); }

    /* sheet modal */
    .scrim { position: absolute; inset: 0; z-index: 40; background: rgba(0,0,0,.32); opacity: 0; visibility: hidden; transition: opacity .25s ease; }
    .scrim.open { opacity: 1; visibility: visible; }
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 41; background: var(--screen);
      border-radius: 26px 26px 0 0; padding: 10px 20px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(100%); transition: transform .32s cubic-bezier(.32,.72,0,1); box-shadow: var(--shadow-lg);
      max-height: 88%; overflow-y: auto;
    }
    .sheet.open { transform: none; }
    .grabber { width: 38px; height: 5px; border-radius: 999px; background: var(--ink-3); opacity: .4; margin: 6px auto 14px; }
    .sheet h3 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 7px; }
    .field input {
      width: 100%; font-size: 16px; padding: 13px 15px; border: 1px solid var(--line); border-radius: 14px;
      background: var(--card); color: var(--ink); -webkit-appearance: none; appearance: none; font-family: inherit;
    }
    .field input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
    .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .emoji-row button {
      width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line); background: var(--card);
      font-size: 22px; cursor: pointer; display: grid; place-items: center;
    }
    .emoji-row button.sel { border-color: var(--green); background: var(--green-soft); }
    .seg { display: flex; gap: 6px; background: var(--card-2); padding: 4px; border-radius: 12px; }
    .seg button { flex: 1; border: none; background: none; padding: 9px 6px; border-radius: 9px; font-weight: 600; font-size: 12.5px; color: var(--ink-2); cursor: pointer; }
    .seg button.sel { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
    .btn-cta {
      width: 100%; margin-top: 8px; background: var(--green); color: #fff; border: none; border-radius: 15px;
      padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-cta:active { background: var(--green-strong); }
    .muted-note { text-align: center; font-size: 12px; color: var(--ink-3); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="device">
    <div class="statusbar">
      <span class="tnum">9:41</span>
      <span class="right">
        <span class="sig"><i></i><i></i><i></i><i></i></span>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="var(--ink)" style="opacity:.9"><path d="M8.5 2.2c2 0 3.9.8 5.3 2.1l1.1-1.2C13.2 1.4 10.9.5 8.5.5S3.8 1.4 2.1 3.1l1.1 1.2C4.6 3 6.5 2.2 8.5 2.2zM8.5 5.4c1.1 0 2.2.4 3 1.2l1.1-1.2C11.5 4.3 10 3.7 8.5 3.7S5.5 4.3 4.4 5.4l1.1 1.2c.8-.8 1.9-1.2 3-1.2zM8.5 8.3l1.6-1.7c-.4-.4-1-.6-1.6-.6s-1.2.2-1.6.6L8.5 8.3z"/></svg>
        <span class="batt"></span>
      </span>
    </div>

    <div class="stage" id="stage">
      <!-- ===== HOME ===== -->
      <section class="view active" id="home"></section>
      <!-- ===== GOALS ===== -->
      <section class="view" id="goals"></section>
      <!-- ===== INCOME ===== -->
      <section class="view" id="income"></section>
      <!-- ===== PORTFOLIO ===== -->
      <section class="view" id="portfolio"></section>
      <!-- ===== INSIGHTS ===== -->
      <section class="view" id="insights"></section>
      <!-- ===== PROFILE ===== -->
      <section class="view" id="profile"></section>
      <!-- ===== GOAL DETAIL ===== -->
      <section class="view detail" id="goalDetail"></section>
    </div>

    <button class="fab" id="fab" aria-label="Add">+</button>

    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>
        <span class="tl">主页</span>
      </button>
      <button class="tab" data-tab="goals">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r=".6" fill="currentColor" stroke="none"/></svg>
        <span class="tl">目标</span>
      </button>
      <button class="tab" data-tab="income">
        <svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M17 7.5C17 5.6 14.8 4.5 12 4.5S7 5.6 7 7.5 9 10 12 10.5s5 1 5 3-2.2 3-5 3-5-1.1-5-3"/></svg>
        <span class="tl">收入</span>
      </button>
      <button class="tab" data-tab="portfolio">
        <svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l4-5 3 3 4-6"/></svg>
        <span class="tl">投资</span>
      </button>
      <button class="tab" data-tab="insights">
        <svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-3.5 10.9c.6.5 1 1.2 1 2h5c0-.8.4-1.5 1-2A6 6 0 0 0 12 3Z"/></svg>
        <span class="tl">洞察</span>
      </button>
    </nav>

    <!-- sheet -->
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"></div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
    const money = n => (n < 0 ? '−$' : '$') + Math.abs(Math.round(n)).toLocaleString();
    const money2 = n => (n < 0 ? '−$' : '$') + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    const pctv = n => Math.max(0, Math.min(100, n));

    /* ---------- state ---------- */
    const SEED_GOALS = [
      { id:'g1', emoji:'🏡', name:'House Repair', target:15000, saved:9200, monthly:1400, primary:true,
        sources:[{name:'Salary',pct:45},{name:'Rental income',pct:30},{name:'Stock Portfolio',pct:25}] },
      { id:'g2', emoji:'✈️', name:'Japan Trip', target:6000, saved:2100, monthly:650,
        sources:[{name:'DoorDash',pct:55},{name:'Dividends',pct:20},{name:'Bonus',pct:25}] },
      { id:'g3', emoji:'👵', name:'Support Parents', target:12000, saved:4800, monthly:500,
        sources:[{name:'Salary',pct:70},{name:'Dividends',pct:30}] },
      { id:'g4', emoji:'🐶', name:'小狗基金 Puppy Fund', target:2000, saved:1450, monthly:180,
        sources:[{name:'DoorDash',pct:60},{name:'Savings',pct:40}] },
      { id:'g5', emoji:'🛟', name:'Emergency Fund', target:10000, saved:10000, monthly:0,
        sources:[{name:'Salary',pct:60},{name:'Savings',pct:40}] },
      { id:'g6', emoji:'🌅', name:'Retirement', target:500000, saved:82000, monthly:2000,
        sources:[{name:'Stock Portfolio',pct:65},{name:'Dividends',pct:20},{name:'Salary',pct:15}] },
    ];
    const SEED_INCOME = [
      { id:'i1', emoji:'💼', name:'Salary', type:'Fixed monthly', amount:5200, unit:'/mo' },
      { id:'i2', emoji:'📈', name:'Stock Portfolio', type:'Variable', amount:1300, unit:'/mo avg' },
      { id:'i3', emoji:'💰', name:'Dividends', type:'Recurring', amount:180, unit:'/mo' },
      { id:'i4', emoji:'🚗', name:'DoorDash', type:'Variable', amount:420, unit:'/mo avg' },
      { id:'i5', emoji:'🏠', name:'Rental income', type:'Fixed monthly', amount:1100, unit:'/mo' },
      { id:'i6', emoji:'🎁', name:'Year-end Bonus', type:'One-time', amount:8000, unit:'once' },
    ];
    const load = (k, seed) => { try { return JSON.parse(localStorage.getItem(k)) || seed; } catch(e){ return seed; } };
    let goals = load('xg_goals', SEED_GOALS);
    let income = load('xg_income', SEED_INCOME);
    const saveGoals = () => localStorage.setItem('xg_goals', JSON.stringify(goals));
    const saveIncome = () => localStorage.setItem('xg_income', JSON.stringify(income));

    /* ---------- computed ---------- */
    const gpct = g => pctv(g.target ? g.saved / g.target * 100 : 0);
    const gremain = g => Math.max(0, g.target - g.saved);
    const gdays = g => g.monthly > 0 && gremain(g) > 0 ? Math.ceil(gremain(g) / (g.monthly/30)) : (gremain(g) === 0 ? 0 : null);
    const etaText = g => { const d = gdays(g); if (d === 0) return 'Goal reached'; if (d == null) return 'Add funding'; if (d < 60) return `~${d} days left`; return `~${Math.round(d/30)} months left`; };
    const etaDate = g => { const d = gdays(g); if (d == null || d===0) return null; const dt = new Date(Date.now()+d*864e5); return dt.toLocaleDateString(undefined,{month:'short', year:'numeric'}); };

    /* ---------- ring ---------- */
    function ring(pct, size=132, stroke=13) {
      const r = (size - stroke) / 2, c = 2 * Math.PI * r, off = c * (1 - pct/100);
      const done = pct >= 100;
      return `<div class="ring" style="width:${size}px;height:${size}px">
        <svg width="${size}" height="${size}">
          <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--green-ring-track)" stroke-width="${stroke}" fill="none"/>
          <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--green)" stroke-width="${stroke}" fill="none"
            stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
        </svg>
        <div class="ring-center">
          <div>
            <div class="pct tnum">${Math.round(pct)}<span>%</span></div>
            <div class="pct-sub">${done ? 'complete' : 'funded'}</div>
          </div>
        </div>
      </div>`;
    }

    /* ---------- HOME ---------- */
    function renderHome() {
      const g = goals.find(x => x.primary) || goals[0];
      const hour = new Date().getHours();
      const greet = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';
      const today = [
        { emoji:'💼', name:'Salary earned', meta:'today so far', amt:173 },
        { emoji:'💰', name:'Dividends', meta:'VOO · SCHD', amt:6 },
        { emoji:'📈', name:'Investment gains', meta:'unrealized', amt:84 },
        { emoji:'🚗', name:'Side income', meta:'DoorDash · 2 trips', amt:38 },
      ];
      const total = today.reduce((s,t)=>s+t.amt,0);
      const v = $('#home'); v.innerHTML = '';

      const top = el('div','topbar');
      top.innerHTML = `<div><div class="eyebrow">${greet} · 小狗钱钱</div><h1 class="greet">Hi, Kai 👋</h1></div>`;
      const av = el('div','avatar','K'); av.onclick = () => go('profile'); top.appendChild(av);
      v.appendChild(top);

      const hero = el('div','card hero');
      hero.innerHTML = `
        <div class="htop">
          <div class="goal-emoji">${g.emoji}</div>
          <div><div class="hname">${g.name}</div><div class="hsub">Primary goal · every dollar has a purpose</div></div>
        </div>
        <div class="ring-wrap">
          ${ring(gpct(g))}
          <div class="stats">
            <div class="hstat"><div class="k">Saved</div><div class="v tnum">${money(g.saved)}</div></div>
            <div class="hstat"><div class="k">Remaining</div><div class="v small tnum">${money(gremain(g))}</div></div>
          </div>
        </div>
        <div class="eta"><span class="dot"></span>${etaText(g)}${etaDate(g)?' · '+etaDate(g):''}</div>`;
      hero.onclick = () => openGoal(g.id);
      v.appendChild(hero);

      v.appendChild(el('div','section-title','Today’s progress'));
      const tcard = el('div','card today');
      tcard.appendChild(el('div','today-total','<div><div class="eyebrow">You moved forward</div></div><div class="amt tnum">+'+money(total)+'</div>'));
      today.forEach(t => tcard.appendChild(el('div','prow',
        `<div class="pico">${t.emoji}</div><div><div class="pname">${t.name}</div><div class="pmeta">${t.meta}</div></div><div class="pamt pos tnum">+${money(t.amt)}</div>`)));
      v.appendChild(tcard);

      v.appendChild(el('div','encourage','🐶 每一天，你都离梦想更近一点。'));
    }

    /* ---------- GOALS ---------- */
    function goalCard(g) {
      const done = gpct(g) >= 100;
      const c = el('div','card goal-card');
      c.innerHTML = `
        <div class="gc-top">
          <div class="goal-emoji">${g.emoji}</div>
          <div><div class="gc-name">${g.name}</div><div class="gc-eta">${etaText(g)}</div></div>
          ${done ? '<span class="done-badge">✓ Reached</span>' : `<span class="gc-pct tnum">${Math.round(gpct(g))}%</span>`}
        </div>
        <div class="bar"><i style="width:${gpct(g)}%"></i></div>
        <div class="gc-foot"><span class="saved tnum">${money(g.saved)}</span><span class="target tnum">of ${money(g.target)}</span></div>`;
      c.onclick = () => openGoal(g.id);
      return c;
    }
    function renderGoals() {
      const v = $('#goals'); v.innerHTML = '';
      v.appendChild(el('div','topbar','<div><div class="eyebrow">Dreams in progress</div><h1 class="greet">Goals</h1></div>'));
      const wrap = el('div',null,''); wrap.style.marginTop = '18px';
      goals.forEach(g => wrap.appendChild(goalCard(g)));
      v.appendChild(wrap);
    }

    /* ---------- GOAL DETAIL ---------- */
    function openGoal(id) {
      const g = goals.find(x => x.id === id); if (!g) return;
      const v = $('#goalDetail');
      const sug = [
        `One extra DoorDash shift each week would reach <b>${g.name}</b> ${Math.round(18 + gpct(g)/4)} days sooner.`,
        `Redirecting this month’s dividends here moves the date forward by <b>12 days</b>.`,
        `You’re ${Math.round(gpct(g))}% there — staying consistent finishes ${etaDate(g)?'around '+etaDate(g):'on schedule'}.`
      ];
      const hist = [12, 20, 26, 34, 41, 52, 60, Math.round(gpct(g))];
      v.innerHTML = `
        <div class="detail-nav"><span class="back" id="detBack">‹ Goals</span></div>
        <div class="detail-hero">
          ${ring(gpct(g), 148, 14)}
          <div class="dname">${g.emoji} ${g.name}</div>
          <div class="dsub tnum">${money(g.saved)} of ${money(g.target)} · ${etaText(g)}</div>
        </div>
        <div class="section-row"><h2>Funding sources</h2></div>
        <div class="card funds" style="padding:18px">
          ${g.sources.map(s=>`<div class="fund-line"><span class="flabel">${s.name}</span><span class="fbar"><i style="width:${s.pct}%"></i></span><span class="fpct tnum">${s.pct}%</span></div>`).join('')}
        </div>
        <div class="section-row"><h2>Timeline</h2></div>
        <div class="card p20">
          <div style="display:flex;align-items:baseline;justify-content:space-between">
            <div><div class="eyebrow">Projected completion</div><div style="font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:4px">${etaDate(g)||'—'}</div></div>
            <div style="text-align:right"><div class="eyebrow">Monthly</div><div style="font-size:20px;font-weight:800;color:var(--green);margin-top:4px" class="tnum">+${money(g.monthly)}</div></div>
          </div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-top:18px">
            ${hist.map(h=>`<div style="flex:1;background:var(--green-ring-track);border-radius:6px 6px 0 0;height:${Math.max(8,h)}%;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(180deg,var(--green),var(--green-strong));opacity:.9"></div></div>`).join('')}
          </div>
          <div class="eyebrow" style="margin-top:8px">Historical progress · last 8 months</div>
        </div>
        <div class="section-row"><h2>Ways to accelerate</h2></div>
        ${sug.map(s=>`<div class="card insight"><div class="ico">💡</div><div><div class="itxt">${s}</div><div class="itag">Tap to simulate →</div></div></div>`).join('')}
      `;
      $('#detBack').onclick = () => { v.classList.remove('active'); updateFab(); };
      $('#fab').style.display = 'none';
      requestAnimationFrame(()=>{ v.scrollTop = 0; v.classList.add('active'); });
    }

    /* ---------- INCOME ---------- */
    function renderIncome() {
      const v = $('#income'); v.innerHTML = '';
      v.appendChild(el('div','topbar','<div><div class="eyebrow">Every stream has a job</div><h1 class="greet">Income</h1></div>'));
      const monthly = income.filter(i=>i.unit!=='once').reduce((s,i)=>s+i.amount,0);
      const strip = el('div','summary-strip');
      strip.innerHTML = `
        <div class="card"><div class="k">Monthly inflow</div><div class="v green tnum">${money(monthly)}</div></div>
        <div class="card"><div class="k">Sources</div><div class="v tnum">${income.length}</div></div>`;
      v.appendChild(strip);
      v.appendChild(el('div','section-title','Sources'));
      const list = el('div','card list');
      income.forEach(i => list.appendChild(el('div','irow',
        `<div class="goal-emoji" style="width:40px;height:40px;font-size:20px">${i.emoji}</div>
         <div><div class="iname">${i.name}</div><span class="badge">${i.type}</span></div>
         <div class="iamt"><div class="m tnum">${money(i.amount)}</div><div class="u">${i.unit}</div></div>`)));
      v.appendChild(list);
    }

    /* ---------- PORTFOLIO ---------- */
    const HOLDINGS = [
      { tk:'VOO', name:'S&P 500 ETF', value:28400, gain:3120, glpct:12.3, div:'$310/yr', alloc:'52%', funds:[{n:'House Repair',p:70},{n:'Retirement',p:30}] },
      { tk:'SCHD', name:'Dividend ETF', value:9800, gain:540, glpct:5.8, div:'$420/yr', alloc:'18%', funds:[{n:'Support Parents',p:60},{n:'Emergency Fund',p:40}] },
      { tk:'AAPL', name:'Apple Inc.', value:12600, gain:1840, glpct:17.1, div:'$96/yr', alloc:'23%', funds:[{n:'Japan Trip',p:100}] },
      { tk:'CASH', name:'High-yield savings', value:3800, gain:152, glpct:4.0, div:'4.2% APY', alloc:'7%', funds:[{n:'Puppy Fund',p:100}] },
    ];
    function renderPortfolio() {
      const v = $('#portfolio'); v.innerHTML = '';
      const total = HOLDINGS.reduce((s,h)=>s+h.value,0);
      const gain = HOLDINGS.reduce((s,h)=>s+h.gain,0);
      v.appendChild(el('div','topbar','<div><div class="eyebrow">Working toward your goals</div><h1 class="greet">Portfolio</h1></div>'));
      const strip = el('div','summary-strip');
      strip.innerHTML = `
        <div class="card"><div class="k">Total value</div><div class="v tnum">${money(total)}</div></div>
        <div class="card"><div class="k">Total gain</div><div class="v green tnum">+${money(gain)}</div></div>`;
      v.appendChild(strip);
      v.appendChild(el('div','section-title','Holdings'));
      HOLDINGS.forEach(h => {
        const c = el('div','card holding');
        c.innerHTML = `
          <div class="h-top">
            <div class="goal-emoji" style="width:44px;height:44px;font-size:14px;font-weight:800">${h.tk}</div>
            <div><div class="h-tk">${h.tk}</div><div class="h-name">${h.name}</div></div>
            <div class="h-val"><div class="mv tnum">${money(h.value)}</div><div class="gl tnum" style="color:var(--green)">+${money(h.gain)} · +${h.glpct}%</div></div>
          </div>
          <div class="h-meta">
            <div><div class="k">Dividends</div><div class="val tnum">${h.div}</div></div>
            <div><div class="k">Allocation</div><div class="val tnum">${h.alloc}</div></div>
          </div>
          <div class="funds"><div class="fund-title">Funds these goals</div>
            ${h.funds.map(f=>`<div class="fund-line"><span class="flabel">${f.n}</span><span class="fbar"><i style="width:${f.p}%"></i></span><span class="fpct tnum">${f.p}%</span></div>`).join('')}
          </div>`;
        v.appendChild(c);
      });
    }

    /* ---------- INSIGHTS ---------- */
    const INSIGHTS = [
      { ico:'💰', t:'Your dividends paid for <b>2% of your Japan trip</b> this month.', tag:'Dividends → Japan Trip' },
      { ico:'🚗', t:'One extra DoorDash shift each week would help you reach <b>House Repair 41 days sooner</b>.', tag:'Suggestion' },
      { ico:'🏡', t:'You saved enough this month to move <b>House Repair forward by 12 days</b>.', tag:'Ahead of schedule' },
      { ico:'📈', t:'Your portfolio gains this month cover <b>3 weeks of the Retirement goal</b>.', tag:'Investments → Retirement' },
      { ico:'🐶', t:'小狗钱钱 says: every dollar you added today already has a job. Keep the streak going.', tag:'Daily encouragement' },
    ];
    function renderInsights() {
      const v = $('#insights'); v.innerHTML = '';
      v.appendChild(el('div','topbar','<div><div class="eyebrow">Calm, encouraging, actionable</div><h1 class="greet">Insights</h1></div>'));
      const wrap = el('div',null,''); wrap.style.marginTop = '18px';
      INSIGHTS.forEach(i => wrap.appendChild(el('div','card insight',
        `<div class="ico">${i.ico}</div><div><div class="itxt">${i.t}</div><div class="itag">${i.tag}</div></div>`)));
      v.appendChild(wrap);
    }

    /* ---------- PROFILE ---------- */
    function renderProfile() {
      const v = $('#profile'); v.innerHTML = '';
      v.appendChild(el('div','topbar','<div><div class="eyebrow">Account</div><h1 class="greet">Profile</h1></div>'));
      v.appendChild(el('div','profile-hero',
        `<div class="avatar">K</div><div class="pname">Kai</div><div class="pmail">chenkai319@gmail.com</div>`));
      const menu = el('div','card menu'); menu.style.marginTop='18px';
      [['🎯','Goal reminders'],['💵','Currency · USD'],['🔔','Notifications'],['🌙','Appearance · Auto'],['🔒','Privacy · On-device'],['❓','Help & about 小狗钱钱']]
        .forEach(([i,t]) => menu.appendChild(el('div','mrow',`<div class="mico">${i}</div>${t}<span class="chev">›</span>`)));
      v.appendChild(menu);
      v.appendChild(el('div','encourage','小狗钱钱 · A Dog Called Money · v1.0'));
    }

    /* ---------- navigation ---------- */
    const RENDER = { home:renderHome, goals:renderGoals, income:renderIncome, portfolio:renderPortfolio, insights:renderInsights, profile:renderProfile };
    let current = 'home';
    function go(tab) {
      $('#goalDetail').classList.remove('active');
      (RENDER[tab] || renderHome)();
      document.querySelectorAll('.view').forEach(v => { if (v.id!=='goalDetail') v.classList.toggle('active', v.id===tab); });
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
      current = tab;
      updateFab();
    }
    function updateFab() {
      const detailOpen = $('#goalDetail').classList.contains('active');
      $('#fab').style.display = (!detailOpen && (current==='goals' || current==='income')) ? 'grid' : 'none';
    }
    document.querySelectorAll('.tab').forEach(t => t.onclick = () => go(t.dataset.tab));

    /* ---------- add sheets ---------- */
    const GOAL_EMOJIS = ['🏡','✈️','🚗','👵','🐶','🎓','💍','🌅','🛟','🎁','🏝️','📱'];
    const INC_EMOJIS = ['💼','📈','💰','🚗','🏠','🎁','🏦','💵','🧾','🎨'];
    function openSheet(html) { $('#sheet').innerHTML = '<div class="grabber"></div>'+html; $('#scrim').classList.add('open'); $('#sheet').classList.add('open'); }
    function closeSheet() { $('#scrim').classList.remove('open'); $('#sheet').classList.remove('open'); }
    $('#scrim').onclick = closeSheet;

    function addGoalSheet() {
      let emoji = '🎯';
      openSheet(`
        <h3>New goal</h3>
        <div class="field"><label>Icon</label><div class="emoji-row" id="ge">${GOAL_EMOJIS.map(e=>`<button>${e}</button>`).join('')}</div></div>
        <div class="field"><label>Goal name</label><input id="gn" placeholder="e.g. Dream vacation" autocomplete="off"></div>
        <div class="field"><label>Target amount ($)</label><input id="gt" type="number" inputmode="decimal" placeholder="5000"></div>
        <div class="field"><label>Already saved ($)</label><input id="gs" type="number" inputmode="decimal" placeholder="0"></div>
        <div class="field"><label>Monthly contribution ($)</label><input id="gm" type="number" inputmode="decimal" placeholder="400"></div>
        <button class="btn-cta" id="gsave">Create goal</button>
        <div class="muted-note">Saved on this device · nothing is uploaded</div>`);
      const btns = document.querySelectorAll('#ge button'); btns[0].classList.add('sel'); emoji = GOAL_EMOJIS[0];
      btns.forEach((b,i)=> b.onclick = () => { btns.forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); emoji = GOAL_EMOJIS[i]; });
      $('#gsave').onclick = () => {
        const name = $('#gn').value.trim(); const target = +$('#gt').value;
        if (!name) return $('#gn').focus(); if (!target || target<=0) return $('#gt').focus();
        goals.push({ id:'g'+Date.now(), emoji, name, target, saved:+$('#gs').value||0, monthly:+$('#gm').value||0,
          sources:[{name:'Salary',pct:60},{name:'Savings',pct:40}] });
        saveGoals(); closeSheet(); go('goals');
      };
    }
    function addIncomeSheet() {
      let emoji = '💵', type = 'Fixed monthly';
      openSheet(`
        <h3>New income source</h3>
        <div class="field"><label>Icon</label><div class="emoji-row" id="ie">${INC_EMOJIS.map(e=>`<button>${e}</button>`).join('')}</div></div>
        <div class="field"><label>Source name</label><input id="in" placeholder="e.g. Freelance design" autocomplete="off"></div>
        <div class="field"><label>Amount ($)</label><input id="ia" type="number" inputmode="decimal" placeholder="500"></div>
        <div class="field"><label>Type</label><div class="seg" id="iseg">
          ${['Fixed monthly','Variable','One-time','Recurring'].map((t,i)=>`<button class="${i===0?'sel':''}" data-t="${t}">${t.split(' ')[0]}</button>`).join('')}
        </div></div>
        <button class="btn-cta" id="isave">Add source</button>
        <div class="muted-note">Saved on this device · nothing is uploaded</div>`);
      const ebtns = document.querySelectorAll('#ie button'); ebtns[0].classList.add('sel'); emoji = INC_EMOJIS[0];
      ebtns.forEach((b,i)=> b.onclick = () => { ebtns.forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); emoji = INC_EMOJIS[i]; });
      const sbtns = document.querySelectorAll('#iseg button');
      sbtns.forEach(b => b.onclick = () => { sbtns.forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); type = b.dataset.t; });
      $('#isave').onclick = () => {
        const name = $('#in').value.trim(); const amount = +$('#ia').value;
        if (!name) return $('#in').focus(); if (!amount || amount<=0) return $('#ia').focus();
        income.push({ id:'i'+Date.now(), emoji, name, type, amount, unit: type==='One-time'?'once':'/mo' });
        saveIncome(); closeSheet(); go('income');
      };
    }
    $('#fab').onclick = () => { if (current==='income') addIncomeSheet(); else addGoalSheet(); };

    /* ---------- init ---------- */
    go('home');
  </script>
</body>
</html>

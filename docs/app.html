<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <title>My Portfolio</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --bg-grad: radial-gradient(1200px 600px at 50% -10%, #e8edff 0%, rgba(232,237,255,0) 60%);
      --card: #ffffff;
      --card-2: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --border: #e6e9ef;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --up: #059669;
      --up-bg: rgba(5,150,105,.12);
      --down: #dc2626;
      --down-bg: rgba(220,38,38,.12);
      --shadow: 0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.06);
      --radius: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --bg-grad: radial-gradient(1200px 600px at 50% -10%, #1a2140 0%, rgba(26,33,64,0) 60%);
        --card: #131a2b;
        --card-2: #0f1626;
        --text: #e8ecf4;
        --muted: #94a3b8;
        --faint: #64748b;
        --border: #232c42;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --up: #34d399;
        --up-bg: rgba(52,211,153,.14);
        --down: #f87171;
        --down-bg: rgba(248,113,113,.14);
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); background-image: var(--bg-grad); background-repeat: no-repeat;
      color: var(--text); margin: 0; line-height: 1.45;
      padding:
        max(20px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        calc(28px + env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    header { display: flex; align-items: center; gap: 10px; margin: 4px 2px 18px; }
    header .logo { font-size: 22px; }
    header h1 { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
    header .tag { margin-left: auto; font-size: 12px; color: var(--faint); }

    /* Hero */
    .hero {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      box-shadow: var(--shadow); padding: 22px 22px 18px; margin-bottom: 16px;
    }
    .hero .hlabel { font-size: 13px; color: var(--muted); font-weight: 500; }
    .hero .hvalue { font-size: 40px; font-weight: 800; letter-spacing: -.02em; margin: 2px 0 8px; line-height: 1.1; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 14px;
      padding: 5px 12px; border-radius: 999px;
    }
    .badge.up { color: var(--up); background: var(--up-bg); }
    .badge.down { color: var(--down); background: var(--down-bg); }
    .badge.flat { color: var(--muted); background: var(--card-2); }
    .hgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
    .hgrid .k { font-size: 12px; color: var(--muted); }
    .hgrid .v { font-size: 17px; font-weight: 700; margin-top: 2px; }

    /* Add form */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px;
    }
    .card h2 { font-size: 13px; font-weight: 700; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.wide { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--muted); font-weight: 600; }
    input {
      font-size: 16px; /* prevents iOS auto-zoom */
      padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--card-2); color: var(--text); font-family: inherit; width: 100%;
      -webkit-appearance: none; appearance: none; min-height: 46px;
    }
    input::placeholder { color: var(--faint); }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); background: var(--card); }
    button { font-family: inherit; border: none; cursor: pointer; font-weight: 700; -webkit-appearance: none; appearance: none; }
    .btn-primary {
      width: 100%; margin-top: 12px; background: var(--accent); color: #fff;
      font-size: 16px; padding: 14px; border-radius: 12px; min-height: 50px;
      transition: background .15s ease;
    }
    .btn-primary:active { background: var(--accent-hover); }

    /* Holdings list (cards) */
    .list-head { display: flex; align-items: center; justify-content: space-between; margin: 22px 4px 12px; }
    .list-head h2 { font-size: 15px; font-weight: 700; margin: 0; }
    .btn-clear { background: transparent; color: var(--down); font-size: 13px; padding: 6px 8px; border-radius: 8px; }

    .holdings { display: flex; flex-direction: column; gap: 12px; }
    .pos {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 14px 16px;
    }
    .pos-top { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 11px; flex: 0 0 auto;
      display: grid; place-items: center; font-weight: 800; font-size: 14px; letter-spacing: -.02em;
      background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent);
    }
    .pos-id { min-width: 0; }
    .pos-ticker { font-weight: 800; font-size: 16px; letter-spacing: -.01em; }
    .pos-sub { font-size: 12px; color: var(--muted); }
    .pos-val { margin-left: auto; text-align: right; }
    .pos-val .mv { font-weight: 800; font-size: 16px; }
    .pos-val .gl { font-size: 12.5px; font-weight: 700; margin-top: 1px; }
    .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--muted); }
    .del {
      margin-left: 6px; background: transparent; color: var(--faint); width: 34px; height: 34px;
      border-radius: 9px; font-size: 20px; line-height: 1; flex: 0 0 auto;
    }
    .del:active { background: var(--down-bg); color: var(--down); }

    .pos-foot {
      display: flex; flex-wrap: wrap; gap: 8px 18px; margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed var(--border);
    }
    .metric { display: flex; flex-direction: column; }
    .metric .k { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .03em; }
    .metric .v { font-size: 14px; font-weight: 700; }
    .price-edit {
      display: flex; align-items: center; gap: 6px; margin-left: auto;
    }
    .price-edit label { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .03em; }
    .price-edit input {
      width: 104px; text-align: right; padding: 9px 11px; min-height: 40px; font-size: 16px;
    }

    .empty {
      text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px;
      background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .empty .big { font-size: 30px; display: block; margin-bottom: 8px; }
    footer { text-align: center; color: var(--faint); font-size: 12px; margin-top: 24px; }

    @media (min-width: 560px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
      .field.wide { grid-column: auto; }
      .btn-primary { width: auto; padding: 14px 28px; }
      .form-row { display: flex; align-items: flex-end; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="logo">📈</span>
      <h1>My Portfolio</h1>
      <span class="tag">saved on this device</span>
    </header>

    <!-- Hero summary -->
    <section class="hero">
      <div class="hlabel">Portfolio Value</div>
      <div class="hvalue tnum" id="heroValue">$0.00</div>
      <span class="badge flat" id="heroBadge">—</span>
      <div class="hgrid">
        <div><div class="k">Cost Basis</div><div class="v tnum" id="heroCost">$0.00</div></div>
        <div><div class="k">Holdings</div><div class="v tnum" id="heroCount">0</div></div>
      </div>
    </section>

    <!-- Add holding -->
    <section class="card">
      <h2>Add a holding</h2>
      <div class="grid">
        <div class="field wide">
          <label for="ticker">Ticker</label>
          <input id="ticker" placeholder="AAPL" autocomplete="off" autocapitalize="characters" spellcheck="false" enterkeyhint="next" />
        </div>
        <div class="field">
          <label for="shares">Shares</label>
          <input id="shares" type="number" inputmode="decimal" step="any" min="0" placeholder="10" enterkeyhint="next" />
        </div>
        <div class="field">
          <label for="cost">Avg Cost</label>
          <input id="cost" type="number" inputmode="decimal" step="any" min="0" placeholder="150.00" enterkeyhint="next" />
        </div>
        <div class="field">
          <label for="price">Current Price</label>
          <input id="price" type="number" inputmode="decimal" step="any" min="0" placeholder="175.00" enterkeyhint="done" />
        </div>
      </div>
      <button id="add" class="btn-primary">Add holding</button>
    </section>

    <div class="list-head">
      <h2>Holdings</h2>
      <button id="clear" class="btn-clear" hidden>Clear all</button>
    </div>

    <div class="holdings" id="holdings"></div>
    <div class="empty" id="empty"><span class="big">💼</span>No holdings yet.<br/>Add your first position above.</div>

    <footer>Prices are entered by you · data stays in this browser</footer>
  </div>

  <script>
    const STORAGE_KEY = 'my_portfolio_v1';
    const $ = id => document.getElementById(id);
    const tickerIn = $('ticker'), sharesIn = $('shares'), costIn = $('cost'), priceIn = $('price');

    function load() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; } }
    function save(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

    const money = n => (n < 0 ? '-$' : '$') + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const num = n => (+n).toLocaleString(undefined, { maximumFractionDigits: 4 });
    const pct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    const cls = n => n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
    const arrow = n => n > 0 ? '▲' : n < 0 ? '▼' : '•';
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

    function render() {
      const holdings = load();
      const box = $('holdings');
      box.innerHTML = '';
      const has = holdings.length > 0;
      $('empty').hidden = has;
      $('clear').hidden = !has;

      let totCost = 0, totValue = 0;

      holdings.forEach(h => {
        const shares = +h.shares || 0, cost = +h.cost || 0;
        const price = (h.price === '' || h.price == null) ? null : +h.price;
        const basis = shares * cost;
        const value = price == null ? null : shares * price;
        const gain = value == null ? null : value - basis;
        const gainPct = (value == null || basis === 0) ? null : (gain / basis) * 100;
        totCost += basis;
        totValue += value == null ? basis : value;

        const el = document.createElement('div');
        el.className = 'pos';
        el.innerHTML = `
          <div class="pos-top">
            <div class="avatar">${esc(h.ticker.slice(0,4))}</div>
            <div class="pos-id">
              <div class="pos-ticker">${esc(h.ticker)}</div>
              <div class="pos-sub tnum">${num(shares)} sh @ ${money(cost)}</div>
            </div>
            <div class="pos-val">
              <div class="mv tnum">${value == null ? '—' : money(value)}</div>
              <div class="gl tnum ${gain == null ? 'flat' : cls(gain)}">${gain == null ? 'set price' : arrow(gain) + ' ' + money(gain) + ' · ' + pct(gainPct)}</div>
            </div>
            <button class="del" title="Remove" aria-label="Remove ${esc(h.ticker)}">×</button>
          </div>
          <div class="pos-foot">
            <div class="metric"><span class="k">Cost basis</span><span class="v tnum">${money(basis)}</span></div>
            <div class="price-edit">
              <label>Current</label>
              <input type="number" inputmode="decimal" step="any" min="0" placeholder="—" />
            </div>
          </div>`;

        const inp = el.querySelector('.price-edit input');
        inp.value = price == null ? '' : price;
        inp.addEventListener('change', () => {
          const list = load(); const item = list.find(x => x.id === h.id);
          if (item) { item.price = inp.value.trim() === '' ? '' : +inp.value; save(list); render(); }
        });
        el.querySelector('.del').addEventListener('click', () => { save(load().filter(x => x.id !== h.id)); render(); });
        box.appendChild(el);
      });

      const totGain = totValue - totCost;
      const totGainPct = totCost === 0 ? 0 : (totGain / totCost) * 100;
      $('heroValue').textContent = money(totValue);
      $('heroCost').textContent = money(totCost);
      $('heroCount').textContent = holdings.length;
      const badge = $('heroBadge');
      badge.className = 'badge ' + (has ? cls(totGain) : 'flat');
      badge.textContent = has ? `${arrow(totGain)} ${money(totGain)} · ${pct(totGainPct)}` : '—';
    }

    function add() {
      const ticker = tickerIn.value.trim().toUpperCase();
      const shares = sharesIn.value.trim(), cost = costIn.value.trim(), price = priceIn.value.trim();
      if (!ticker) return tickerIn.focus();
      if (shares === '' || +shares <= 0) return sharesIn.focus();
      if (cost === '' || +cost < 0) return costIn.focus();
      const list = load();
      list.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2), ticker, shares: +shares, cost: +cost, price: price === '' ? '' : +price });
      save(list);
      tickerIn.value = sharesIn.value = costIn.value = priceIn.value = '';
      tickerIn.focus();
      render();
    }

    $('add').addEventListener('click', add);
    priceIn.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
    $('clear').addEventListener('click', () => { if (confirm('Remove all holdings? This cannot be undone.')) { localStorage.removeItem(STORAGE_KEY); render(); } });

    render();
  </script>
</body>
</html>
